name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: authdb
          POSTGRES_USER: authuser
          POSTGRES_PASSWORD: authpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U authuser -d authdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: authsvc.config.settings.test
      # Run the suite against PostgreSQL so the refresh-rotation concurrency
      # test (which needs select_for_update row locking) actually executes.
      TEST_DATABASE: postgres
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_NAME: authdb
      DB_USER: authuser
      DB_PASSWORD: authpass
      REDIS_CACHE_URL: redis://localhost:6379/1
      TEST_REDIS: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Check for missing migrations
        run: python manage.py makemigrations --check --dry-run

      - name: Django system checks
        run: python manage.py check

      - name: Run tests
        run: pytest -ra

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build production image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: susiauth:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

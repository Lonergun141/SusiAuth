<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign in — SusiAuth</title>
    <style>
      body { font-family: system-ui, Arial, sans-serif; max-width: 360px; margin: 8vh auto; padding: 0 16px; }
      h1 { font-size: 1.4rem; }
      label { display: block; margin: 12px 0 4px; }
      input { width: 100%; padding: 8px; box-sizing: border-box; }
      button { margin-top: 16px; padding: 10px 16px; width: 100%; }
      .errors { color: #b00020; }
    </style>
  </head>
  <body>
    <h1>Sign in to SusiAuth</h1>
    {% if form.errors %}<p class="errors">Invalid email or password.</p>{% endif %}
    <form method="post">
      {% csrf_token %}
      <label for="id_username">Email</label>
      <input type="text" name="username" id="id_username" autocomplete="username" autofocus>
      <label for="id_password">Password</label>
      <input type="password" name="password" id="id_password" autocomplete="current-password">
      <input type="hidden" name="next" value="{{ next }}">
      <button type="submit">Sign in</button>
    </form>
  </body>
</html>
